<html>
<head>
    <title>
        괄호안에 문자 제거하여 출력
    </title>
</head>
<body>

<script>
function solution(str) {
    let stack = [];
    let answer = [];  // 🔹 문자열 대신 배열

    for (let i of str) {
        if (i === "(") {
            stack.push(i);
        }
        else if (i === ")") {
            stack.pop();
        }
        else {
            if (stack.length === 0) {
                answer.push(i);  // 🔹 push로 저장
            }
        }
    }
    return answer.join("");  // 🔹 join으로 문자열 만들기
}


let str = "(A(BC(D)EF(G(H)(IJ)(K)LM)(N))";

console.log(solution(str));
</script>

</body>
</html>
