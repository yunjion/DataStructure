<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배열 - 보이는 학생 </title>
</head>
<body>
    <script>
        function solution() {
            let answer = 1, max = arr[0];
            for(let i = 1; i <arr.length; i++) {
                if(arr[i] > max) {
                    answer++;
                    max = arr[i];
                }
            }
            return answer;
        }

        let arr = [130, 135, 148, 140, 145, 150, 154];
        console.log(solution(arr));

    </script>
</body>
